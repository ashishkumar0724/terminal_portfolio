  #     POSTGRES_USER: portfolio
  #     POSTGRES_PASSWORD: portfolio123
  #     POSTGRES_DB: portfolio
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - portfolio-network

# volumes:
#   postgres-data:

networks:
  portfolio-network:
    driver: bridge
