# ============================================
# Docker Compose for Terminal Portfolio
# Production configuration
# ============================================

services:
  terminal-portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terminal-portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
